name: Build OpenWrt Package

on:
workflow_dispatch:
push:
branches:
- main
- master

jobs:
build:
runs-on: ubuntu-latest


strategy:
  fail-fast: false
  matrix:
    branch:
      - openwrt-24.10
      - master

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        clang \
        flex \
        bison \
        gawk \
        gettext \
        git \
        libncurses5-dev \
        libssl-dev \
        python3 \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl

  - name: Clone OpenWrt
    run: |
      git clone --depth=1 \
        -b ${{ matrix.branch }} \
        https://github.com/openwrt/openwrt.git

  - name: Update Feeds
    run: |
      cd openwrt
      ./scripts/feeds update -a
      ./scripts/feeds install -a

  - name: Copy Package
    run: |
      mkdir -p openwrt/package/luci-app-button
      cp -rf ./* openwrt/package/luci-app-button/

  - name: Defconfig
    run: |
      cd openwrt
      make defconfig

  - name: Compile Package
    run: |
      cd openwrt
      make package/luci-app-button/compile V=s -j$(nproc)

  - name: Collect Artifacts
    run: |
      mkdir output
      find openwrt/bin/packages \
        \( -name "*.ipk" -o -name "*.apk" \) \
        -exec cp {} output/ \;

  - name: Upload Artifacts
    uses: actions/upload-artifact@v4
    with:
      name: packages-${{ matrix.branch }}
      path: output

