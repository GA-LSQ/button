name: Build luci-app-button

on:
workflow_dispatch:
inputs:
tag:
description: "Release Version (leave empty to skip release)"
required: false
default: ""

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
strategy:
  fail-fast: false
  matrix:
    sdk:
      - 24.10.6
      - SNAPSHOT

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Build Package
    uses: openwrt/gh-action-sdk@main
    env:
      ARCH: aarch64_cortex-a53-${{ matrix.sdk }}
      FEEDNAME: button_ci
      PACKAGES: luci-app-button
      NO_REFRESH_CHECK: 1
      NO_SHFMT_CHECK: 1
      V: s

  - name: Collect Packages
    run: |
      mkdir -p output
      find bin/packages -name "*.ipk" -exec cp {} output/ \; || true
      find bin/packages -name "*.apk" -exec cp {} output/ \; || true

  - name: Upload Artifacts
    uses: actions/upload-artifact@v4
    with:
      name: packages-${{ matrix.sdk }}
      path: output/*
```

release:
name: Release
needs: build
runs-on: ubuntu-latest
if: github.event.inputs.tag != ''

```
steps:
  - name: Download Artifacts
    uses: actions/download-artifact@v4
    with:
      path: artifacts

  - name: Prepare Files
    run: |
      mkdir -p release
      find artifacts -name "*.ipk" -exec cp {} release/ \;
      find artifacts -name "*.apk" -exec cp {} release/ \;

  - name: Publish Release
    uses: softprops/action-gh-release@v2
    with:
      tag_name: ${{ github.event.inputs.tag }}
      files: release/*
```
